name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  stable-quality:
    name: Stable quality and package qualification
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test --all-features
      - name: Build documentation with warnings denied
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps
      - name: List package contents
        run: cargo package --list
      - name: Verify publish dry run
        run: cargo publish --dry-run

  msrv:
    name: Rust 1.85.0 MSRV qualification
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Rust 1.85.0
        uses: dtolnay/rust-toolchain@1.85.0
      - name: Check all targets on Rust 1.85.0
        run: cargo +1.85.0 check --all-targets --all-features
      - name: Test on Rust 1.85.0
        run: cargo +1.85.0 test --all-features
